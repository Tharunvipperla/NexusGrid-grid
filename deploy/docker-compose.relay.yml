# Nexus Relay Server — docker compose deployment.
#
#   NEXUS_GRID_KEY=your-shared-secret docker compose -f deploy/docker-compose.relay.yml up -d
#
# Run from the Phase-2 root. The build context is the repo root (..) because the
# image needs relay_server_modified.py, which lives there.
# Every node that should reach this relay must be configured with the
# same NEXUS_GRID_KEY. See docs/guides/relay-deploy.md for the full guide.
services:
  relay:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.relay
    ports:
      - "9000:9000"
    environment:
      # Shared secret — nodes authenticate to the relay with this.
      NEXUS_GRID_KEY: "${NEXUS_GRID_KEY:?set NEXUS_GRID_KEY before starting}"
      # Refuse to start with the built-in default key.
      NEXUS_RELAY_REQUIRE_NON_DEFAULT_KEY: "true"
    restart: unless-stopped
